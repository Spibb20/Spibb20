<svg width="900" height="560" viewBox="0 0 900 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      fill: #ffffff;
    }

    .subtitle {
      font-family: Arial, sans-serif;
      font-size: 15px;
      fill: #a7f3d0;
    }

    .line {
      stroke: rgba(255,255,255,0.45);
      stroke-width: 3;
      fill: none;
    }

    .field {
      fill: #052e16;
      stroke: #22c55e;
      stroke-width: 4;
    }

    .player {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: appear 0.7s ease forwards;
    }

    .player circle {
      fill: #0f172a;
      stroke: #38bdf8;
      stroke-width: 3;
      filter: drop-shadow(0 0 8px #38bdf8);
    }

    .player text {
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      fill: white;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .role {
      font-size: 10px;
      fill: #bbf7d0;
      font-weight: 500;
    }
    .sub {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: subAppear 0.5s ease forwards;
    }

    @keyframes subAppear {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(12px);
      }
      70% {
        opacity: 1;
        transform: scale(1.15) translateY(-4px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

    .sub1 { animation-delay: 3.7s; }
    .sub2 { animation-delay: 3.9s; }
    .sub3 { animation-delay: 4.1s; }
    .sub4 { animation-delay: 4.3s; }
    .sub5 { animation-delay: 4.5s; }
    .sub6 { animation-delay: 4.7s; }
    .sub7 { animation-delay: 4.9s; }

    @keyframes appear {
      0% {
        opacity: 0;
        transform: scale(0.4) translateY(20px);
      }
      60% {
        opacity: 1;
        transform: scale(1.25) translateY(-8px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .p1 { animation-delay: 0.2s; }
    .p2 { animation-delay: 0.5s; }
    .p3 { animation-delay: 0.8s; }
    .p4 { animation-delay: 1.1s; }
    .p5 { animation-delay: 1.4s; }
    .p6 { animation-delay: 1.7s; }
    .p7 { animation-delay: 2.0s; }
    .p8 { animation-delay: 2.3s; }
    .p9 { animation-delay: 2.6s; }
    .p10 { animation-delay: 2.9s; }
    .p11 { animation-delay: 3.2s; }
  </style>

  <!-- Background -->
  <rect width="900" height="560" rx="24" fill="#020617"/>

  <!-- Header -->
  <text x="450" y="45" class="title" text-anchor="middle">Byarjn's Tech Lineup </text>
  <text x="450" y="72" class="subtitle" text-anchor="middle">4-3-3 formation powered by Cruyff, Bielsa, Sachi</text>

  <!-- Football field -->
  <rect x="80" y="95" width="740" height="420" rx="18" class="field"/>

  <!-- Field lines -->
  <line x1="450" y1="95" x2="450" y2="515" class="line"/>
  <circle cx="450" cy="305" r="58" class="line"/>
  <circle cx="450" cy="305" r="5" fill="rgba(255,255,255,0.7)"/>

  <!-- Penalty boxes -->
  <rect x="80" y="205" width="100" height="200" class="line"/>
  <rect x="720" y="205" width="100" height="200" class="line"/>

  <rect x="80" y="255" width="42" height="100" class="line"/>
  <rect x="778" y="255" width="42" height="100" class="line"/>

  <!-- Goalkeeper -->
  <g transform="translate(135 305)">
  <g class="player p1">
    <circle r="34"/>
    <text y="-5">Git</text>
    <text y="13" class="role">GK</text>
  </g>
</g>

  <!-- Defenders 4 -->
  <g transform="translate(270 165)">
    <g class="player p2">
    <circle r="34"/>
    <text y="-5">HTML</text>
    <text y="13" class="role">LB</text>
    </g>
  </g>

  <g transform="translate(270 260)">
    <g class="player p3">
    <circle r="34"/>
    <text y="-5">CSS</text>
    <text y="13" class="role">CB</text>
    </g>
  </g>

  <g transform="translate(270 350)">
    <g class="player p4">
    <circle r="34"/>
    <text y="-5">JS</text>
    <text y="13" class="role">CB</text>
    </g>
  </g>

  <g transform="translate(270 445)">
    <g class="player p5">
    <circle r="34"/>
    <text y="-5">TS</text>
    <text y="13" class="role">RB</text>
    </g>
  </g>

  <!-- Midfielders 3 -->
  <g transform="translate(450 215)">
    <g class="player p6">
    <circle r="36"/>
    <text y="-5">React</text>
    <text y="13" class="role">CM</text>
    </g>
  </g>

  <g transform="translate(450 305)">
    <g class="player p7">
    <circle r="38"/>
    <text y="-5">Next</text>
    <text y="13" class="role">CAM</text>
    </g>
  </g>

  <g transform="translate(450 395)">
    <g class="player p8">
    <circle r="36"/>
    <text y="-5">Node</text>
    <text y="13" class="role">CM</text>
    </g>
  </g>

  <!-- Forwards 3 -->
  <g transform="translate(650 200)">
    <g class="player p9">
    <circle r="35"/>
    <text y="-5">Prisma</text>
    <text y="13" class="role">LW</text>
    </g>
  </g>

  <g transform="translate(690 305)">
    <g class="player p10">
    <circle r="39"/>
    <text y="-5">Postgres</text>
    <text y="13" class="role">ST</text>
    </g>
  </g>

  <g transform="translate(650 410)">
    <g class="player p11">
    <circle r="35"/>
    <text y="-5">Vercel</text>
    <text y="13" class="role">RW</text>
    </g>
  </g>

  <!-- Substitutions bench background -->
<rect x="110" y="470" width="680" height="50" rx="16" fill="#020617" stroke="#334155" stroke-width="2"/>

<text x="135" y="501"
      font-family="Arial, sans-serif"
      font-size="14"
      font-weight="700"
      fill="#facc15">
  SUBSTITUTIONS
</text>

<!-- Bench players -->
<g transform="translate(265 495)">
  <g class="sub sub1">
  <circle r="18" fill="#111827" stroke="#facc15" stroke-width="2"/>
  <text y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Mongo</text>
  </g>
</g>

<g transform="translate(330 495)">
  <g class="sub sub2">
  <circle r="18" fill="#111827" stroke="#facc15" stroke-width="2"/>
  <text y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Clerk</text>
  </g>
</g>

<g transform="translate(395 495)">
  <g class="sub sub3">
  <circle r="18" fill="#111827" stroke="#facc15" stroke-width="2"/>
  <text y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Tailwind</text>
  </g>
</g>

<g transform="translate(470 495)">
  <g class="sub sub4">
  <circle r="18" fill="#111827" stroke="#facc15" stroke-width="2"/>
  <text y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Express</text>
  </g>
</g>

<g transform="translate(545 495)">
  <g class="sub sub5">
  <circle r="18" fill="#111827" stroke="#facc15" stroke-width="2"/>
  <text y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Neon</text>
  </g>
</g>

<g transform="translate(610 495)">
  <g class="sub sub6">
  <circle r="18" fill="#111827" stroke="#facc15" stroke-width="2"/>
  <text y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Gemini</text>
  </g>
</g>

<g transform="translate(675 495)">
  <g class="sub sub7">
  <circle r="18" fill="#111827" stroke="#facc15" stroke-width="2"/>
  <text y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Nx</text>
  </g>
</g>
</svg>